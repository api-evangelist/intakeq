actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. IntakeQ's public API is request/response
    REST (https://intakeq.com/api/v1, X-Auth-Key auth). Asynchronous events are
    delivered via outbound HTTP webhooks, not a server-push WebSocket, so no
    AsyncAPI document was created - there is no bidirectional/streaming transport
    on IntakeQ's own API to model.
