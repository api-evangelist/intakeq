aid: intakeq
name: IntakeQ
review:
  question: Does IntakeQ expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. IntakeQ's public developer surface is a
    request/response REST API under https://intakeq.com/api/v1, authenticated
    with an X-Auth-Key header. IntakeQ does provide event delivery, but it is
    implemented as outbound HTTP webhooks (intake completed, note locked, and
    invoice lifecycle events) configured in the API settings - server-to-endpoint
    HTTP POSTs, not a bidirectional WebSocket transport. There is no ws:// or
    wss:// endpoint documented to model.
findings:
  summary: |
    IntakeQ does not publish a documented public WebSocket API. IntakeQ (and its
    PracticeQ practice-management tier) is a HIPAA-compliant platform for health
    and wellness practitioners. Its public API is pure request/response REST over
    HTTPS with a base URL of https://intakeq.com/api/v1, and every request carries
    the account API key in an X-Auth-Key header. The documented surface covers
    clients, appointments, intake questionnaires and consent forms, treatment
    notes, invoices, and file attachments. Asynchronous notifications are
    delivered via outbound HTTP webhooks (configured in the API settings), not a
    WebSocket. No realtime, bidirectional, or streaming WebSocket (ws:// or
    wss://) endpoint is documented on IntakeQ's API as of the review date.
  openSource: |
    IntakeQ is a proprietary, closed-source hosted SaaS product. There is no
    self-hostable engine and no public source repository for the platform. No
    official IntakeQ GitHub organization was identified during the review; the
    API is consumed entirely against the hosted https://intakeq.com/api/v1
    endpoints.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://intakeq.com/api/v1
      documented: true
      note: The entire public API. API-key auth via the X-Auth-Key header.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Outbound HTTP POST callbacks configured in API settings - intake
        completed, note locked, and invoice events (InvoiceIssued, InvoicePaid,
        InvoicePaymentPlanChargeFailed, InvoiceAutoChargeFailed, InvoiceCancelled,
        InvoicePaymentRefunded). Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in IntakeQ's API reference as of the review date.
