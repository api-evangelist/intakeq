name: IntakeQ
kind: company
description: IntakeQ is a HIPAA-compliant practice management platform for health and
  wellness practitioners - therapists, chiropractors, counselors, dietitians, and
  other small practices. It provides secure electronic intake forms, e-signatures,
  and document sharing, and through its PracticeQ tier adds appointment scheduling,
  a booking widget, a secure client portal, payments and invoicing, treatment notes,
  telehealth, and insurance billing. IntakeQ publishes a documented REST API under
  https://intakeq.com/api/v1 authenticated with an X-Auth-Key header, covering
  clients, appointments, intake questionnaires, treatment notes, invoices, and file
  attachments, plus webhooks for intake completion, note locking, and invoice events.
