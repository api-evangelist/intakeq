description: >-
  IntakeQ is sold as a per-practitioner monthly subscription with a 14-day free
  trial (no credit card required) and month-to-month billing. There are two
  product families: "Forms Only" (secure intake forms, e-signatures, document
  sharing) and "Practice Management" (the PracticeQ tier - adds scheduling, a
  booking widget, client portal, payments and invoicing, telehealth, and
  insurance billing). Each family has a standard plan and a discounted
  low-volume plan with submission/appointment caps. Additional practitioner
  seats are billed on top of the base plan. The REST API is included with the
  subscription at no extra charge; API access is enabled under More > Settings >
  Integrations > Developer API. Prices below reflect the public pricing page as
  observed on the created date and should be reconciled against the live page.
notes: >-
  IntakeQ and PracticeQ are the same company; the practice-management plans are
  branded PracticeQ. Prices vary slightly across listing sites; verify current
  base prices, per-seat add-ons, and volume caps on the IntakeQ pricing page
  during reconciliation. E-prescribing is an additional monthly add-on.
sources:
- https://intakeq.com/pricing
- https://www.practiceq.com/pricing
- https://support.intakeq.com/article/102-subscription-plan-limits
