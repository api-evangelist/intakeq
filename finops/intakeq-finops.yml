description: >-
  FinOps view of IntakeQ / PracticeQ spend. IntakeQ is a per-practitioner SaaS
  subscription rather than a usage-metered API, so cost is driven by the chosen
  plan family (Forms Only vs Practice Management), the standard vs low-volume
  tier, and the number of practitioner seats. The REST API is included in the
  subscription at no incremental per-call charge, so API usage does not directly
  generate spend - though the documented rate limit (10 req/min, 500/day) is the
  practical governor on integration throughput. Optional add-ons such as
  e-prescribing and payment processing fees are separate line items.
notes: >-
  Per-unit API pricing does not apply; the dominant cost drivers are plan
  selection and practitioner-seat count. Reconcile base prices, per-seat
  add-ons, and any e-prescribing / payment-processing fees against the live
  IntakeQ pricing page.
