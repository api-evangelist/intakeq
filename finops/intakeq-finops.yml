meters:
- name: base_subscription
  description: Monthly per-account base subscription for the selected plan (Forms Only or Practice Management).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: practitioner_seats
  description: Additional practitioner seats billed monthly on top of the base plan.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: form_submissions
  description: Client form submissions, which are capped on the low-volume tiers and govern plan fit.
  unit: submissions
  aggregation: sum
  dimensions:
  - account
  - practitioner
- name: appointments
  description: Appointments booked, capped on the low-volume Practice Management tier.
  unit: appointments
  aggregation: sum
  dimensions:
  - account
  - practitioner
principles:
- name: Visibility
  description: Track base plan, seat count, and monthly form-submission / appointment volume to confirm the plan tier still fits.
- name: Allocation
  description: Attribute practitioner seats to the individuals or locations using them so subscription cost maps to teams.
- name: Optimization
  description: Choose the low-volume tier when submission/appointment counts are low, right-size seat count, and avoid paying for Practice Management features when only Forms are needed.
- name: Accountability
  description: Review seat count and plan tier each billing cycle and drop unused seats; request a higher API rate-limit threshold only when integration volume justifies it.
